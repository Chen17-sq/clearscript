name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel and sdist
        run: uv build

      - name: Build clearscript.skill bundle
        run: bash scripts/build_skill.sh

      - name: Verify all release artifacts exist
        run: |
          ls -la dist/
          test -n "$(ls dist/*.whl 2>/dev/null)" || { echo "::error::wheel missing from dist/"; exit 1; }
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || { echo "::error::sdist missing from dist/"; exit 1; }
          test -f dist/clearscript.skill || { echo "::error::skill bundle missing from dist/"; exit 1; }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          if-no-files-found: error
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/clearscript.skill

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/clearscript.skill
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Install

            ### Standalone app (web UI)
            ```bash
            pipx install clearscript-${{ github.ref_name }}-py3-none-any.whl
            clearscript serve
            ```

            ### As a Claude skill
            ```bash
            mkdir -p ~/.claude/skills
            unzip -o clearscript.skill -d ~/.claude/skills/
            ```
            Restart Claude Code; the skill is auto-loaded on transcript-cleanup tasks.
