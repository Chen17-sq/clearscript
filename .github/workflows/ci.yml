name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v

  # Packaging breakage shipped invisibly through green CI twice (uv build
  # hard-failing on duplicate force-include paths; releases missing the
  # wheel). This job makes the build + install path a first-class CI
  # citizen: build the wheel, install it into a clean venv, verify the
  # data files made it in, boot the app factory.
  package:
    name: build + install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel and sdist
        run: uv build

      - name: Build skill bundle (must not clobber wheel/sdist)
        run: |
          bash scripts/build_skill.sh
          test -n "$(ls dist/*.whl 2>/dev/null)" || { echo "::error::skill build wiped the wheel"; exit 1; }
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || { echo "::error::skill build wiped the sdist"; exit 1; }
          test -f dist/clearscript.skill || { echo "::error::skill bundle missing"; exit 1; }

      - name: Install wheel into clean venv + smoke test
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/python - << 'EOF'
          from importlib import resources

          # Data files that MUST be inside the wheel for the app to boot.
          for pkg, name in [
              ("clearscript.web", "index.html"),
              ("clearscript.library", "schema.sql"),
              ("clearscript.prompts", "system_base.md"),
          ]:
              assert resources.files(pkg).joinpath(name).is_file(), f"{pkg}/{name} missing from wheel"

          from clearscript.prompts import compose_bootstrap_prompt, compose_edit_prompt, compose_self_review_prompt
          assert len(compose_edit_prompt()) > 1000
          assert len(compose_bootstrap_prompt()) > 500
          assert len(compose_self_review_prompt()) > 500

          from clearscript.api import create_app
          app = create_app()
          route_count = len([r for r in app.routes if getattr(r, "methods", None)])
          assert route_count >= 40, f"only {route_count} routes registered"
          print(f"smoke OK — {route_count} routes, prompts load, data files present")
          EOF

      - name: CLI entrypoint smoke
        run: /tmp/smoke/bin/clearscript version
